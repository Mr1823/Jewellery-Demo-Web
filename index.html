<!DOCTYPE html>
<html data-theme="light" lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="/favicon.png"
      media="(prefers-color-scheme: light)"
    />
    <link
      rel="icon"
      type="image/svg+xml"
      href="/favicon.png"
      media="(prefers-color-scheme: dark)"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Jewelz Store</title>
    <script>
      window.addEventListener('error', function(e) {
        var loader = document.getElementById('app-loader');
        if (loader) {
          loader.innerHTML = '<p style="color:red; padding: 20px;">Script Error: ' + e.message + '<br>Line: ' + e.lineno + '</p>';
        }
      });
      window.addEventListener('unhandledrejection', function(e) {
        var loader = document.getElementById('app-loader');
        if (loader) {
          loader.innerHTML = '<p style="color:red; padding: 20px;">Promise Error: ' + (e.reason && e.reason.message ? e.reason.message : e.reason) + '</p>';
        }
      });
    </script>
    <style>
      /* Inline loading spinner so users see something immediately on slow connections */
      #app-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #fff;
        z-index: 99999;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      #app-loader .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid #f3f3f3;
        border-top: 4px solid #c6a255;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      #app-loader p {
        margin-top: 16px;
        color: #666;
        font-size: 14px;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- This loading spinner shows while the JS bundle downloads -->
      <div id="app-loader">
        <div class="spinner"></div>
        <p>Loading The Jewelz Store...</p>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
